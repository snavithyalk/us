<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Mini-Site | Navithya</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2979ff;
            --accent: #ffeb3b;
            --bg: #f8fafc;
            --card-bg: #fff;
            --text: #1e293b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .hero { background: linear-gradient(135deg, #1e3a8a, #2979ff); color: white; padding: 4rem 2rem; text-align: center; }
        .hero h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; margin-bottom: 0.5rem; }
        .provider-meta { font-size: 1.1rem; opacity: 0.9; margin-bottom: 2rem; }
        .container { max-width: 1000px; margin: -2rem auto 4rem; padding: 0 1rem; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 2rem; }
        .gallery-item img { width: 100%; border-radius: 8px; }
        .cta-btn { background: var(--accent); color: #000; padding: 1rem 2rem; border-radius: 30px; text-decoration: none; font-weight: bold; display: inline-block; transition: transform 0.3s; }
        .cta-btn:hover { transform: scale(1.05); }
        .footer { text-align: center; padding: 2rem; border-top: 1px solid #e2e8f0; font-size: 0.9rem; color: #64748b; }
    </style>
</head>
<body>

    <section class="hero">
        <div id="hero-content">
            <h1 id="provider-name">Loading...</h1>
            <p class="provider-meta" id="provider-tagline"></p>
            <a href="index.html" class="cta-btn">Book My Service Now</a>
        </div>
    </section>

    <div class="container">
        <div class="card">
            <h3>About Our Service</h3>
            <p id="provider-desc">We provide high-quality professional services in your area. Trusted and verified by the Navithya team.</p>
            
            <div id="gallery-section" class="hidden">
                <h3 style="margin-top:2rem;">Work Gallery</h3>
                <div class="gallery-grid" id="provider-gallery"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 Powered by <a href="index.html" style="color:var(--primary);">Navithya Portal</a>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        // Use exact same config from app.js
        const firebaseConfig = {
            apiKey: "AIzaSyAs7...", // Note: Real app should have this from app.js
            authDomain: "navithya-f418d.firebaseapp.com",
            databaseURL: "https://navithya-f418d-default-rtdb.firebaseio.com",
            projectId: "navithya-f418d",
            storageBucket: "navithya-f418d.appspot.com",
            messagingSenderId: "244196142131",
            appId: "1:244196142131:web:53a60a4f5f9ae61ba9339e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('id');

        if (pid) {
            db.ref('users/' + pid).once('value', snapshot => {
                const u = snapshot.val();
                if (u) {
                    document.getElementById('provider-name').innerText = u.companyName || u.name;
                    document.getElementById('provider-tagline').innerText = `${u.providerService} Expert in ${u.district}`;
                    document.title = `${u.companyName || u.name} | Navithya`;
                }
            });
        }
    </script>
</body>
</html>
